<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>업로드 — hanalmchan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f8f8f8;
    color: #111;
    font-family: Helvetica, Arial, sans-serif;
    font-size: 13px;
    min-height: 100vh;
    padding: 60px 40px;
  }

  h1 {
    font-size: 14px;
    font-weight: normal;
    letter-spacing: 0.1em;
    margin-bottom: 40px;
    color: #888;
  }
  h1 a { color: #888; text-decoration: none; }
  h1 a:hover { color: #111; }

  .notice {
    background: #fffbe6;
    border: 1px solid #ffe58f;
    border-radius: 4px;
    padding: 12px 16px;
    font-size: 12px;
    color: #666;
    line-height: 1.8;
    margin-bottom: 30px;
  }
  .notice strong { color: #111; }

  button {
    border: 1px solid #111;
    background: #111;
    color: #fff;
    padding: 12px 28px;
    font-size: 12px;
    font-family: inherit;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s;
    margin-right: 8px;
  }
  button:hover { background: #333; }
  button.secondary { background: transparent; color: #111; }
  button.secondary:hover { background: #f0f0f0; }

  #controls { margin-bottom: 30px; }

  #uploaded-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 30px;
  }
  .uploaded-item {
    width: 130px;
    border: 1px solid #eee;
    border-radius: 4px;
    overflow: hidden;
    background: #fff;
  }
  .uploaded-item img {
    width: 100%;
    height: 100px;
    object-fit: cover;
    display: block;
  }
  .uploaded-item .cap {
    width: 100%;
    border: none;
    border-top: 1px solid #eee;
    padding: 6px 8px;
    font-size: 11px;
    font-family: inherit;
    outline: none;
  }
  .uploaded-item .cap::placeholder { color: #ccc; }

  #result-section { display: none; }
  #result-section h2 {
    font-size: 13px; font-weight: normal; color: #888;
    letter-spacing: 0.08em; margin-bottom: 16px;
  }
  #result-json {
    background: #fff; border: 1px solid #eee; border-radius: 4px;
    padding: 16px; font-size: 11px; font-family: monospace;
    white-space: pre; overflow: auto; color: #333;
    margin-bottom: 16px; max-height: 300px;
  }
</style>
</head>
<body>

<h1><a href="index.html">← hanalmchan</a> &nbsp;/&nbsp; 업로드</h1>

<div class="notice">
  <strong>사용법</strong><br>
  1. <strong>사진 업로드</strong> 버튼으로 Cloudinary에 사진 올리기<br>
  2. 캡션 입력 (선택)<br>
  3. <strong>posts.json 다운로드</strong> 후 GitHub에 교체 업로드
</div>

<div id="controls">
  <button id="open-widget">사진 업로드</button>
  <button class="secondary" id="clear-btn" style="display:none">초기화</button>
</div>

<div id="uploaded-grid"></div>

<div id="result-section">
  <h2>posts.json 내용 (기존 + 새 사진)</h2>
  <div id="result-json"></div>
  <button id="copy-btn">JSON 복사</button>
  <button class="secondary" id="download-btn">posts.json 다운로드</button>
</div>

<script>
(function() {
  var CLOUD_NAME = 'dunb80s62';
  var UPLOAD_PRESET = 'hanalmchan';

  var grid = document.getElementById('uploaded-grid');
  var clearBtn = document.getElementById('clear-btn');
  var resultSection = document.getElementById('result-section');
  var resultJson = document.getElementById('result-json');
  var copyBtn = document.getElementById('copy-btn');
  var downloadBtn = document.getElementById('download-btn');

  var uploaded = [];
  var existingPosts = [];

  fetch('posts.json?v=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(d) { existingPosts = d || []; })
    .catch(function() { existingPosts = []; });

  var widget = cloudinary.createUploadWidget({
    cloudName: CLOUD_NAME,
    uploadPreset: UPLOAD_PRESET,
    sources: ['local', 'url', 'camera'],
    multiple: true,
    resourceType: 'image',
    maxImageFileSize: 10000000,
    maxImageWidth: 4000,
    maxImageHeight: 4000
  }, function(error, result) {
    if (!error && result && result.event === 'success') {
      var info = result.info;
      uploaded.push({
        public_id: info.public_id,
        url: info.secure_url,
        width: info.width,
        height: info.height,
        caption: ''
      });
      renderGrid();
      updateResult();
    }
  });

  document.getElementById('open-widget').addEventListener('click', function() {
    widget.open();
  });

  function renderGrid() {
    grid.innerHTML = '';
    clearBtn.style.display = uploaded.length > 0 ? '' : 'none';
    uploaded.forEach(function(u, i) {
      var div = document.createElement('div');
      div.className = 'uploaded-item';
      var img = document.createElement('img');
      img.src = u.url;
      div.appendChild(img);
      var cap = document.createElement('input');
      cap.className = 'cap';
      cap.placeholder = '캡션 (선택)';
      cap.value = u.caption;
      cap.addEventListener('input', function() {
        uploaded[i].caption = this.value;
        updateResult();
      });
      div.appendChild(cap);
      grid.appendChild(div);
    });
  }

  function updateResult() {
    resultSection.style.display = uploaded.length > 0 ? 'block' : 'none';
    var merged = existingPosts.concat(uploaded);
    resultJson.textContent = JSON.stringify(merged, null, 2);
  }

  clearBtn.addEventListener('click', function() {
    uploaded = [];
    renderGrid();
    updateResult();
  });

  copyBtn.addEventListener('click', function() {
    navigator.clipboard.writeText(resultJson.textContent).then(function() {
      copyBtn.textContent = '복사됨 ✓';
      setTimeout(function() { copyBtn.textContent = 'JSON 복사'; }, 2000);
    });
  });

  downloadBtn.addEventListener('click', function() {
    var merged = existingPosts.concat(uploaded);
    var blob = new Blob([JSON.stringify(merged, null, 2)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'posts.json';
    a.click();
    URL.revokeObjectURL(a.href);
  });

})();
</script>
</body>
</html>
