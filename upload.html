<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8">
<title>hanalmchan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #ffffff;
    color: #111111;
    font-family: Helvetica, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }

  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    cursor: grab;
    touch-action: none;
  }
  #canvas.dragging { cursor: grabbing; }

  #plane {
    position: absolute;
    top: 0; left: 0;
    width: 1px; height: 1px;
    will-change: transform;
    transform: translate3d(0, 0, 0) scale(0.2688);
    transform-origin: 0 0;
  }

  #header {
    position: fixed; top: 70px; left: 20px; z-index: 100;
    font-size: 13px; mix-blend-mode: difference; color: #ffffff;
    display: flex; align-items: center; gap: 14px;
  }
  #header a { color: inherit; text-decoration: none; display: inline-block; cursor: pointer; }
  #header a:hover { color: #888888; }
  #header img.logo {
    display: block; width: 175px; height: auto;
    -webkit-user-drag: none; user-drag: none; pointer-events: none;
  }
  #header img.logo:not([src]),
  #header img.logo[src=""] { display: none; }

  #nav {
    position: fixed; bottom: 20px; right: 20px; z-index: 100;
    font-size: 12px; mix-blend-mode: difference; color: #ffffff;
  }
  #nav a { color: inherit; text-decoration: none; margin-left: 12px; }
  #nav a:hover { color: #888888; }

  .post { position: absolute; top: 0; left: 0; }
  .post img.photo {
    display: block; max-height: none; max-width: none;
    -webkit-user-drag: none; user-drag: none; pointer-events: none;
  }
  .post-photo a, .post-photoset a { display: block; cursor: inherit; pointer-events: none; }
  .post-text, .post-quote, .post-link { width: 625px; padding: 20px; }
  .caption {
    margin-top: 10px; font-size: 12px; color: #111111;
    max-width: 625px; padding: 10px; background: rgba(255,255,255,0.9);
  }

  #hint {
    font-size: 11px; color: #888888;
    pointer-events: none; opacity: 0.7; transition: opacity 0.5s;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    white-space: pre-line; line-height: 1.6;
  }
  #hint:empty { display: none; }
  #hint.hidden { opacity: 0; }

  /* 헤더 밖 독립 요소 — blend-mode 영향 없음 */
  #wait-msg {
    position: fixed;
    top: 74px; left: 20px;
    z-index: 101;
    font-size: 11px;
    color: #888888;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
  }
  #wait-msg.visible { opacity: 1; }
</style>

</head>
<body>

<div id="header">
  <a href="/" id="header-link">hanalmchan</a>
  <div id="hint"></div>
</div>

<!-- 헤더 밖 별도 배치 -->

<div id="wait-msg">잠시만 기다려 주세요</div>

<div id="nav"></div>

<div id="canvas">
  <div id="plane"></div>
</div>

<script>
(function() {
  var probe = new Image();
  probe.onload = function() {
    if (probe.naturalWidth === 0) return;
    var a = document.getElementById('header-link');
    if (!a) return;
    a.textContent = '';
    var logo = document.createElement('img');
    logo.className = 'logo';
    logo.alt = 'hanalmchan';
    logo.src = 'logo.png';
    a.appendChild(logo);

    /* 로고 너비 확정 후 wait-msg 위치 맞춤 */
    logo.addEventListener('load', function() {
      repositionWaitMsg();
    });
  };
  probe.src = 'logo.png';
})();
</script>

<script>
(function() {
  'use strict';

  var R2_BASE = 'https://pub-ceb9b80b378a402f8e6967b241cf9128.r2.dev';
  var gap = 4;
  var planeScale = 0.2688;
  var BASE_SCALE = 0.2688;
  var BASE_LOGO_W = 175;
  var curImgW = 0, curImgH = 0;
  var HEADER_X = 20, HEADER_Y = 70;

  var canvas  = document.getElementById('canvas');
  var plane   = document.getElementById('plane');
  var hint    = document.getElementById('hint');
  var waitMsg = document.getElementById('wait-msg');

  var GUIDE_TEXT = '스크롤·드래그로 탐색 · 로고를 누르면 다음 사진';
  var hintHidden = false;
  var hintTimer  = null;
  var waitTimer  = null;

  /* wait-msg를 로고 오른쪽에 정렬 */
  function repositionWaitMsg() {
    if (!waitMsg) return;
    var logoEl = document.querySelector('#header img.logo');
    if (!logoEl) {
      /* 텍스트 'hanalmchan' 폭 기준 */
      var link = document.getElementById('header-link');
      var x = link ? (link.getBoundingClientRect().right + 14) : 20;
      waitMsg.style.left = x + 'px';
    } else {
      var r = logoEl.getBoundingClientRect();
      waitMsg.style.left = (r.right + 14) + 'px';
    }
    /* 수직: 로고 중앙에 맞춤 */
    var header = document.getElementById('header');
    if (header) {
      var hr = header.getBoundingClientRect();
      waitMsg.style.top = (hr.top + hr.height / 2 - 7) + 'px';
    }
  }

  /* 전역 노출 (logo load 콜백에서 호출) */
  window.repositionWaitMsg = repositionWaitMsg;

  function showWaitMsg() {
    repositionWaitMsg();
    if (waitTimer) { clearTimeout(waitTimer); waitTimer = null; }
    if (waitMsg) waitMsg.classList.add('visible');
  }

  function hideWaitMsg() {
    if (waitMsg) waitMsg.classList.remove('visible');
    if (waitTimer) { clearTimeout(waitTimer); waitTimer = null; }
  }

  function showGuide() {
    if (hintTimer) { clearTimeout(hintTimer); hintTimer = null; }
    if (hint) { hintHidden = false; hint.classList.remove('hidden'); hint.textContent = GUIDE_TEXT; }
  }

  function hideHint() {
    if (hintHidden || !hint) return;
    hintHidden = true;
    hintTimer = setTimeout(function() { if (hint) hint.classList.add('hidden'); }, 1000);
  }

  function fitScaleToScreen(imgW, imgH) {
    if (!imgW || !imgH) return;
    curImgW = imgW; curImgH = imgH;
    planeScale = Math.max((window.innerHeight * 2) / imgH, (window.innerWidth * 2) / imgW);
    var logoEl = document.querySelector('#header img.logo');
    if (logoEl) logoEl.style.width = (BASE_LOGO_W * (planeScale / BASE_SCALE)) + 'px';
  }

  var bounds = { minX:0, maxX:0, minY:0, maxY:0 };

  function updateBounds() {
    var posts = document.querySelectorAll('#plane .post');
    if (!posts.length) return;
    var maxX = -Infinity, maxY = -Infinity;
    for (var i = 0; i < posts.length; i++) {
      var pw = posts[i].offsetWidth  * planeScale;
      var ph = posts[i].offsetHeight * planeScale;
      if (pw > maxX) maxX = pw;
      if (ph > maxY) maxY = ph;
    }
    var W = window.innerWidth, H = window.innerHeight;
    bounds.maxX = maxX >= W ? 0           : (W - maxX) / 2;
    bounds.minX = maxX >= W ? -(maxX - W) : (W - maxX) / 2;
    bounds.maxY = maxY >= H ? 0           : (H - maxY) / 2;
    bounds.minY = maxY >= H ? -(maxY - H) : (H - maxY) / 2;
  }

  var tx = 0, ty = 50;

  function clampPosition() {
    if (tx > bounds.maxX) tx = bounds.maxX;
    if (tx < bounds.minX) tx = bounds.minX;
    if (ty > bounds.maxY) ty = bounds.maxY;
    if (ty < bounds.minY) ty = bounds.minY;
  }

  function updateTransform() {
    clampPosition();
    plane.style.transform = 'translate3d(' + tx + 'px,' + ty + 'px,0) scale(' + planeScale + ')';
  }

  function layoutPosts() {
    var posts = document.querySelectorAll('#plane .post');
    if (!posts.length) return;
    var x = 0;
    for (var i = 0; i < posts.length; i++) {
      var w = posts[i].offsetWidth, h = posts[i].offsetHeight;
      if (!w || !h) continue;
      posts[i].style.left = x + 'px';
      posts[i].style.top  = '0px';
      x += w + gap;
    }
    updateBounds();
  }

  function buildImageUrl(f) { return R2_BASE + '/' + encodeURIComponent(f); }

  var allPosts = [], currentIndex = 0, currentPost = null;
  var isFirstLoad = true;

  function alignToLogo(post) {
    if (post) currentPost = post;
    var p = currentPost;
    if (!p || typeof p.logoX !== 'number') return;
    tx = HEADER_X - p.logoX * planeScale;
    ty = HEADER_Y - p.logoY * planeScale;
    updateTransform();
  }

  function showPost(index, fromClick) {
    if (!allPosts.length) return;
    currentIndex = (index % allPosts.length + allPosts.length) % allPosts.length;
    var post = allPosts[currentIndex];

    if (hintTimer) { clearTimeout(hintTimer); hintTimer = null; }
    if (hint) { hint.textContent = ''; hint.classList.remove('hidden'); }
    hintHidden = false;

    /* 로고 클릭으로 넘길 때만 대기 메시지 표시 */
    if (fromClick) showWaitMsg();

    plane.innerHTML = '';

    var div = document.createElement('div');
    div.className = 'post post-photo';

    var img = new Image();
    img.className = 'photo';
    img.alt       = post.caption || '';
    img.draggable = false;

    img.addEventListener('load', function() {
      img.style.width  = img.naturalWidth  + 'px';
      img.style.height = img.naturalHeight + 'px';
      fitScaleToScreen(img.naturalWidth, img.naturalHeight);
      layoutPosts();
      alignToLogo(post);
      hideWaitMsg();
      showGuide();
    });
    img.addEventListener('error', function() {
      hideWaitMsg();
      if (div.parentNode) div.parentNode.removeChild(div);
    });

    img.src = post.file ? buildImageUrl(post.file) : post.url;

    div.appendChild(img);
    if (post.caption) {
      var cap = document.createElement('div');
      cap.className = 'caption';
      cap.textContent = post.caption;
      div.appendChild(cap);
    }
    plane.appendChild(div);
    layoutPosts();
    setTimeout(layoutPosts, 500);
    setTimeout(layoutPosts, 1500);
  }

  function renderPosts(posts) {
    posts = (posts || []).filter(function(p) {
      return p && (p.file || (p.url && p.url.indexOf('undefined') === -1));
    });
    if (!posts.length) return;
    allPosts = posts;
    showPost(0, false);
  }

  fetch('posts.json?v=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(renderPosts)
    .catch(function() {});

  var resizeTimer = null;
  window.addEventListener('resize', function() {
    if (resizeTimer) clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      if (curImgW && curImgH) {
        fitScaleToScreen(curImgW, curImgH);
        layoutPosts();
        alignToLogo(null);
        repositionWaitMsg();
      }
    }, 100);
  });

  var headerLink = document.getElementById('header-link');
  if (headerLink) {
    headerLink.style.cursor = 'pointer';
    headerLink.addEventListener('click', function(e) {
      e.preventDefault();
      showPost(currentIndex + 1, true); /* fromClick = true */
    });
  }

  function onWheel(e) {
    if (e.ctrlKey || e.metaKey) { e.preventDefault(); return; }
    e.preventDefault();
    hideHint();
    var dx = e.deltaX, dy = e.deltaY;
    if (e.deltaMode === 1) { dx *= 16; dy *= 16; }
    else if (e.deltaMode === 2) { dx *= window.innerWidth; dy *= window.innerHeight; }
    if (e.shiftKey && dx === 0) { dx = dy; dy = 0; }
    tx -= dx; ty -= dy;
    updateTransform();
  }
  window.addEventListener('wheel', onWheel, { passive: false, capture: true });

  var isDragging = false, didMove = false;
  var dragStartX = 0, dragStartY = 0, dragStartTx = 0, dragStartTy = 0;
  var velX = 0, velY = 0, lastDragX = 0, lastDragY = 0;
  var momentumRAF = null;

  function stopMomentum() { if (momentumRAF) { cancelAnimationFrame(momentumRAF); momentumRAF = null; } }

  function startDrag(cx, cy, target) {
    if (target && target.closest && target.closest('button,input,textarea,video,audio,iframe')) return false;
    stopMomentum();
    isDragging = true; didMove = false;
    dragStartX = cx; dragStartY = cy; dragStartTx = tx; dragStartTy = ty;
    lastDragX = cx; lastDragY = cy; velX = 0; velY = 0;
    canvas.classList.add('dragging');
    hideHint();
    return true;
  }

  function moveDrag(cx, cy) {
    if (!isDragging) return;
    var dx = cx - dragStartX, dy = cy - dragStartY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didMove = true;
    velX = cx - lastDragX; velY = cy - lastDragY;
    lastDragX = cx; lastDragY = cy;
    tx = dragStartTx + dx; ty = dragStartTy + dy;
    updateTransform();
  }

  function endDrag() {
    if (!isDragging) return;
    isDragging = false;
    canvas.classList.remove('dragging');
    if (Math.abs(velX) > 0.5 || Math.abs(velY) > 0.5) startMomentum();
  }

  function startMomentum() {
    var f = 0.93;
    function step() {
      velX *= f; velY *= f;
      tx += velX; ty += velY;
      var bx = tx, by = ty;
      updateTransform();
      if (tx === bx && Math.abs(velX) > 0.1) velX = 0;
      if (ty === by && Math.abs(velY) > 0.1) velY = 0;
      if (Math.abs(velX) < 0.1 && Math.abs(velY) < 0.1) { momentumRAF = null; return; }
      momentumRAF = requestAnimationFrame(step);
    }
    momentumRAF = requestAnimationFrame(step);
  }

  canvas.addEventListener('mousedown', function(e) { if (startDrag(e.clientX, e.clientY, e.target)) e.preventDefault(); });
  canvas.addEventListener('dragstart', function(e) { if (e.target.tagName === 'IMG') e.preventDefault(); });
  window.addEventListener('mousemove', function(e) { if (isDragging) { e.preventDefault(); moveDrag(e.clientX, e.clientY); } });
  window.addEventListener('mouseup', endDrag);
  window.addEventListener('mouseleave', endDrag);

  canvas.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) { var t = e.touches[0]; startDrag(t.clientX, t.clientY, e.target); }
    else { e.preventDefault(); endDrag(); }
  }, { passive: false });
  canvas.addEventListener('touchmove', function(e) {
    if (e.touches.length === 1 && isDragging) { e.preventDefault(); var t = e.touches[0]; moveDrag(t.clientX, t.clientY); }
    else if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchend', endDrag);
  canvas.addEventListener('touchcancel', endDrag);

  document.addEventListener('gesturestart',  function(e) { e.preventDefault(); });
  document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
  document.addEventListener('gestureend',    function(e) { e.preventDefault(); });
  document.addEventListener('wheel', function(e) { if (e.ctrlKey || e.metaKey) e.preventDefault(); }, { passive: false, capture: true });

  var lastTouchEnd = 0;
  document.addEventListener('touchend', function(e) {
    var now = Date.now();
    if (now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, { passive: false });

  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && (e.key==='+' || e.key==='-' || e.key==='=' || e.key==='0')) { e.preventDefault(); return; }
    var s = 100;
    if (e.key==='ArrowLeft')  { tx += s; updateTransform(); hideHint(); }
    if (e.key==='ArrowRight') { tx -= s; updateTransform(); hideHint(); }
    if (e.key==='ArrowUp')    { ty += s; updateTransform(); hideHint(); }
    if (e.key==='ArrowDown')  { ty -= s; updateTransform(); hideHint(); }
  });

  canvas.addEventListener('click', function(e) {
    if (didMove) { e.preventDefault(); e.stopPropagation(); }
  }, true);

  updateTransform();

})();
</script>

</body>
</html>
