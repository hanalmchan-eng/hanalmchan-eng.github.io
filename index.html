</head>
<body>

<div id="canvas">
  <div id="plane"></div>
</div>

<div id="header">
  <span class="logo-text">hanalmchan</span>
</div>

<div id="minimap">
  <canvas id="minimapCanvas"></canvas>
</div>

<script>
  const R2_BASE = 'https://pub-ceb9b80b378a402f8e6967b241cf9128.r2.dev';
  const SCALE = 2.156;
  const GAP = 40;

  const canvas = document.getElementById('canvas');
  const plane = document.getElementById('plane');
  const minimapCanvas = document.getElementById('minimapCanvas');
  const ctx = minimapCanvas.getContext('2d');

  let posX = 0, posY = 0;
  let dragging = false;
  let lastX = 0, lastY = 0;
  let bounds = { minX: 0, maxX: 0, minY: 0, maxY: 0 };
  let posts = [];

  // Logo
  const logoImg = new Image();
  logoImg.onload = () => {
    const logoEl = document.getElementById('header');
    const img = document.createElement('img');
    img.className = 'logo';
    img.src = 'logo.png';
    logoEl.innerHTML = '';
    logoEl.appendChild(img);
  };
  logoImg.onerror = () => {};
  logoImg.src = 'logo.png';

  // Resolve image URL from post entry
  function resolveUrl(post) {
    if (post.url) return post.url;
    if (post.file) return R2_BASE + '/' + post.file;
    return '';
  }

  // Load posts
  fetch('posts.json?t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      posts = data.filter(p => resolveUrl(p));
      if (posts.length === 0) return;
      layoutPosts();
    })
    .catch(() => {});

  function layoutPosts() {
    plane.innerHTML = '';
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const maxH = vh * 0.85;

    let x = vw * 0.15;
    let y = vh * 0.1;
    let rowMaxH = 0;
    const cols = Math.max(1, Math.round(vw / 500));
    let col = 0;

    posts.forEach((post, i) => {
      const div = document.createElement('div');
      div.className = 'post';

      const img = document.createElement('img');
      img.className = 'photo';
      img.draggable = false;

      // natural size hint
      if (post.width && post.height) {
        const ratio = post.height / post.width;
        const h = Math.min(maxH, post.height * SCALE);
        const w = h / ratio;
        img.style.height = h + 'px';
        img.style.width = w + 'px';
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        rowMaxH = Math.max(rowMaxH, h);
        x += w + GAP * SCALE;
        col++;
        if (col >= cols) {
          col = 0;
          x = vw * 0.15;
          y += rowMaxH + GAP * SCALE * 2;
          rowMaxH = 0;
        }
      } else {
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        img.onload = () => {
          updateBounds();
          drawMinimap();
        };
      }

      img.src = resolveUrl(post);

      if (post.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.textContent = post.caption;
        div.appendChild(cap);
      }

      div.appendChild(img);
      plane.appendChild(div);
    });

    updateBounds();
    drawMinimap();
  }

  function updateBounds() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const pad = Math.max(vw, vh) * 0.9;
    let maxX = 0, maxY = 0;
    plane.querySelectorAll('.post').forEach(p => {
      maxX = Math.max(maxX, p.offsetLeft + p.offsetWidth);
      maxY = Math.max(maxY, p.offsetTop + p.offsetHeight);
    });
    bounds = {
      minX: -(maxX * SCALE - vw + pad),
      maxX: pad,
      minY: -(maxY * SCALE - vh + pad),
      maxY: pad
    };
  }

  function clamp(val, min, max) { return Math.min(max, Math.max(min, val)); }

  function applyPos() {
    posX = clamp(posX, bounds.minX, bounds.maxX);
    posY = clamp(posY, bounds.minY, bounds.maxY);
    plane.style.transform = `translate(${posX}px, ${posY}px) scale(${SCALE})`;
    drawMinimap();
  }

  // Mouse
  canvas.addEventListener('mousedown', e => {
    dragging = true; lastX = e.clientX; lastY = e.clientY;
    canvas.classList.add('grabbing');
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    posX += e.clientX - lastX; posY += e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    applyPos();
  });
  window.addEventListener('mouseup', () => { dragging = false; canvas.classList.remove('grabbing'); });

  // Touch
  let lastTouchX = 0, lastTouchY = 0;
  canvas.addEventListener('touchstart', e => {
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
  }, { passive: true });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    posX += e.touches[0].clientX - lastTouchX;
    posY += e.touches[0].clientY - lastTouchY;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    applyPos();
  }, { passive: false });

  // Minimap
  function drawMinimap() {
    const mw = minimapCanvas.width = minimapCanvas.offsetWidth * 2;
    const mh = minimapCanvas.height = minimapCanvas.offsetHeight * 2;
    ctx.clearRect(0, 0, mw, mh);

    let totalW = 0, totalH = 0;
    plane.querySelectorAll('.post').forEach(p => {
      totalW = Math.max(totalW, (p.offsetLeft + p.offsetWidth) * SCALE);
      totalH = Math.max(totalH, (p.offsetTop + p.offsetHeight) * SCALE);
    });
    if (totalW === 0 || totalH === 0) return;

    const scaleX = mw / totalW;
    const scaleY = mh / totalH;

    // Draw post thumbnails
    plane.querySelectorAll('.post').forEach(p => {
      const px = p.offsetLeft * SCALE * scaleX;
      const py = p.offsetTop * SCALE * scaleY;
      const pw = p.offsetWidth * SCALE * scaleX;
      const ph = p.offsetHeight * SCALE * scaleY;
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.fillRect(px, py, pw, ph);
    });

    // Draw viewport
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const vx = (-posX) * scaleX;
    const vy = (-posY) * scaleY;
    const vwm = vw * scaleX;
    const vhm = vh * scaleY;

    ctx.strokeStyle = 'rgba(0,0,0,0.8)';
    ctx.lineWidth = 2;
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(vx, vy, vwm, vhm);
    ctx.strokeRect(vx, vy, vwm, vhm);
  }

  // Minimap click to navigate
  document.getElementById('minimap').addEventListener('click', e => {
    const rect = e.currentTarget.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / rect.width;
    const my = (e.clientY - rect.top) / rect.height;

    let totalW = 0, totalH = 0;
    plane.querySelectorAll('.post').forEach(p => {
      totalW = Math.max(totalW, (p.offsetLeft + p.offsetWidth) * SCALE);
      totalH = Math.max(totalH, (p.offsetTop + p.offsetHeight) * SCALE);
    });
    posX = -(mx * totalW - window.innerWidth / 2);
    posY = -(my * totalH - window.innerHeight / 2);
    applyPos();
  });

  window.addEventListener('resize', () => { updateBounds(); applyPos(); drawMinimap(); });

  // Prevent right-click / drag
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('dragstart', e => e.preventDefault());

  applyPos();
</script>

</body>
</html>
